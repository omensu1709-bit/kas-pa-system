# Solana Stream Health Configuration

# Health Check Intervals (in seconds)
health_check_interval=30
latency_check_interval=60
slot_sync_check_interval=10

# Thresholds
max_slot_lag=5
max_latency_ms=1000
min_throughput_mbps=1

# Alert Thresholds
critical_latency_ms=2000
warning_latency_ms=1000

# Network Settings
ping_timeout_ms=5000
ping_count=5

# Redis Settings
redis_health_check=true
redis_command_timeout=5

# Docker Settings
docker_stats_interval=60
container_restart_threshold=3
