<!DOCTYPE html>
<html>
<head>
  <title>Perspective Debug</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #fff; padding: 20px; }
    .log { white-space: pre-wrap; font-size: 12px; line-height: 1.6; }
    .ok { color: #4ade80; }
    .error { color: #f87171; }
    .warn { color: #fbbf24; }
    .info { color: #60a5fa; }
    #viewer { width: 100%; height: 300px; border: 1px solid #333; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Perspective.js Minimal Test</h1>
  <div id="logs" class="log"></div>
  <div id="viewer"></div>

  <script type="module">
    const logs = document.getElementById('logs');
    const viewerContainer = document.getElementById('viewer');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = new Date().toISOString().split('T')[1].split('.')[0] + ' ' + msg;
      logs.appendChild(div);
      console.log(msg);
    }

    async function init() {
      try {
        log('1. Importing @finos/perspective-viewer...');
        await import('/node_modules/@finos/perspective-viewer/dist/esm/perspective-viewer.js');
        log('   OK', 'ok');

        log('2. Importing @finos/perspective...');
        const perspective = await import('/node_modules/@finos/perspective/dist/esm/perspective.js');
        log('   OK - exports: ' + Object.keys(perspective).join(', '), 'ok');

        log('3. Checking customElements...');
        log('   customElements defined: ' + customElements.toString());
        log('   waiting for perspective-viewer...');
        await customElements.whenDefined('perspective-viewer');
        log('   perspective-viewer defined!', 'ok');

        log('4. Creating worker...');
        const worker = await perspective.worker();
        log('   Worker created: ' + typeof worker, 'ok');

        log('5. Creating table...');
        const table = await worker.table({
          timestamp: 'datetime',
          slot: 'integer',
          price: 'float',
          crashProbability: 'float',
          zone: 'string'
        });
        log('   Table created', 'ok');

        log('6. Creating viewer element...');
        const viewer = document.createElement('perspective-viewer');
        viewer.setAttribute('view', 'datagrid');
        viewer.style.width = '100%';
        viewer.style.height = '100%';
        viewerContainer.appendChild(viewer);
        log('   Viewer appended', 'ok');

        log('7. Waiting 2s for viewer...');
        await new Promise(r => setTimeout(r, 2000));

        log('8. Loading table into viewer...');
        await viewer.load(table);
        log('   Table loaded!', 'ok');

        log('9. Adding test data...');
        table.update([{
          timestamp: new Date().toISOString(),
          slot: 12345,
          price: 84.5,
          crashProbability: 0.15,
          zone: 'IGNORE'
        }]);
        log('   Data added! Check the viewer above.', 'ok');

        log('ALL DONE - Perspective should be showing!', 'ok');

      } catch (e) {
        log('ERROR: ' + e.message + '\n' + e.stack, 'error');
      }
    }

    log('Starting minimal Perspective test...');
    init();
  </script>
</body>
</html>
