version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: trinity-redis
    ports: ["127.0.0.1:6379:6379"] # Isolated
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  writer:
    build: ./services/writer
    container_name: trinity-writer
    volumes: ["./data/duckdb:/app/data"]
    depends_on: [redis]
    restart: unless-stopped

  brain:
    build: ./services/brain
    container_name: trinity-brain
    volumes: ["./data/duckdb:/app/data"]
    depends_on: [redis, writer]
    restart: unless-stopped

  oracle:
    build: ./services/oracle
    container_name: trinity-oracle
    volumes: ["./data/duckdb:/app/data"]
    depends_on: [redis, writer, brain]
    restart: unless-stopped

  validator:
    build: ./services/validator
    container_name: trinity-validator
    volumes: ["./data/duckdb:/app/data"]
    depends_on: [writer, oracle]
    restart: unless-stopped
