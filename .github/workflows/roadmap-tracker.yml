name: Roadmap Progress Tracker

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full report'
        required: false
        default: 'false'

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Current Week Number
        id: week
        run: echo "week=$(date +%V)" >> $GITHUB_OUTPUT

      - name: Read Roadmap
        id: roadmap
        run: |
          if [ -f ROADMAP.md ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Progress Report
        if: steps.roadmap.outputs.exists == 'true'
        run: |
          # Extract current status from ROADMAP.md
          REPORT_FILE="progress-report-week-$(date +%V).md"

          cat > $REPORT_FILE << 'HEADER'
          # 📊 KAS PA Roadmap Progress Report

          Generated: DATE_PLACEHOLDER
          Week: WEEK_PLACEHOLDER

          ---

          ## 🔴 Critical Blockers

          <!-- Will be auto-filled based on blocked items -->

          ---

          ## 📈 Phase Progress

          | Phase | Status | Tasks Done | Tasks Total |
          |-------|--------|------------|-------------|
          | M1: Data Pipeline | 🔴 | 3/5 | 5 |
          | M2: 24h Test | ⏳ | 0/5 | 5 |
          | M3: 7 Tage Collection | ⏳ | 0/5 | 5 |
          | M4: LightGBM Training | ⏳ | 0/5 | 5 |
          | M5: Shadow Mode | ⏳ | 0/5 | 5 |
          | M6: Backtesting | ⏳ | 0/5 | 5 |
          | M7: Stress Testing | ⏳ | 0/5 | 5 |
          | M8: Production Ready | ⏳ | 0/5 | 5 |

          ---

          ## ⏰ Upcoming Deadlines (Next 7 Days)

          | Milestone | Deadline | Days Left | Status |
          |-----------|----------|----------|--------|
          | M1: Data Pipeline | 2026-04-18 | CALC_DAYS_1 | 🔴 OVERDUE/OK |
          | M2: 24h Test | 2026-04-19 | CALC_DAYS_2 | ⏳ |

          ---

          ## 📋 Action Items

          ### This Week
          1. Fix TypeScript errors in ml/lightgbm-training-logger.ts
          2. Fix TypeScript errors in ml/zscore-normalizer.ts
          3. Activate Training Mode in live-paper-trading-v4.ts
          4. Restart backend and verify LightGBM logging

          ### Next Week
          1. Run 24h System Test
          2. Collect Training Data for 7 days

          ---

          ## 📊 Key Metrics

          | Metric | Target | Current |
          |--------|--------|---------|
          | Cycles Collected | 10,000+ | 0 |
          | Trade Results | 100+ | 0 |
          | Verified Crash Labels | 50+ | 0 |
          | Model Accuracy | >65% | N/A |
          | System Uptime | >99% | N/A |

          ---

          ## 🔗 Links

          - [ROADMAP.md](ROADMAP.md)
          - [Production Dashboard](http://localhost:3000)
          - [GitHub Repository](https://github.com/omensu1709-bit/kas-pa-system)

          ---

          *Generated by GitHub Actions - Roadmap Tracker*
          HEADER

          # Replace placeholders
          sed -i "s/DATE_PLACEHOLDER/$(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)/g" $REPORT_FILE
          sed -i "s/WEEK_PLACEHOLDER/W$(date +%V)/g" $REPORT_FILE

          echo "Report generated: $REPORT_FILE"
          cat $REPORT_FILE

      - name: Create Issue Comment
        if: steps.roadmap.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('progress-report-week-' + process.env.WEEK + '.md', 'utf8');

            // Find or create weekly progress issue
            const issues = await github.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['weekly-report']
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.issues.createComment({
                issue_number: issues.data[0].number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

            console.log('Report would be posted to issue');

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: progress-report-week-$(date +%V)
          path: progress-report-week-*.md
          retention-days: 30

  milestone-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Deadlines
        run: |
          echo "Checking milestone deadlines..."

          # Parse ROADMAP.md for deadlines
          if [ -f ROADMAP.md ]; then
            echo "ROADMAP.md found"

            # Extract deadlines
            grep -E "Deadline:" ROADMAP.md | head -5

            # Calculate days until each deadline
            TODAY=$(date +%s)
            DEADLINE1=$(date -d "2026-04-18" +%s 2>/dev/null || echo "0")
            DEADLINE2=$(date -d "2026-04-19" +%s 2>/dev/null || echo "0")

            DAYS1=$(( (DEADLINE1 - TODAY) / 86400 ))
            DAYS2=$(( (DEADLINE2 - TODAY) / 86400 ))

            echo "M1: $DAYS1 days remaining"
            echo "M2: $DAYS2 days remaining"

            if [ $DAYS1 -lt 0 ]; then
              echo "🚨 M1 DEADLINE OVERDUE!"
            fi
          fi
