name: Stagnation Alert Tracker

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10:00 UTC
  workflow_dispatch:

jobs:
  check-stagnation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Stale Issues
        uses: actions/stale@v9
        with:
          days-before-stale: 3
          days-before-close: -1
          stale-issue-message: |
            ⚠️ This issue has been inactive for 3+ days!

            **KAS PA Roadmap Alert**

            This task may be stagnating. Please update:
            - Current status
            - Any blockers
            - Expected completion date

            If no update within 7 days, this will be flagged for review.
          stale-branch-message: |
            ⚠️ This branch has been inactive for 3+ days!
          only-labels: 'roadmap,blocker'
          operations-per-run: 50

      - name: Generate Stagnation Report
        run: |
          REPORT="stagnation-report-$(date +%Y%m%d).md"

          cat > $REPORT << 'EOF'
          # 🚨 Stagnation Alert Report

          Generated: TIMESTAMP

          ---

          ## ⚠️ Stale Items (No activity for 3+ days)

          | Item | Last Updated | Days Stale | Priority |
          |------|-------------|------------|----------|
          | (Auto-detected) | | | |

          ---

          ## 🔴 Blockers

          (Items marked as blocked)

          ---

          ## ✅ Recently Completed

          (Items closed in last 7 days)

          ---

          *Generated by GitHub Actions - Stagnation Tracker*
          EOF

          sed -i "s/TIMESTAMP/$(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)/g" $REPORT

          echo "Report: $REPORT"
          cat $REPORT

      - name: Upload Stagnation Report
        uses: actions/upload-artifact@v4
        with:
          name: stagnation-report-$(date +%Y%m%d)
          path: stagnation-report-*.md
          retention-days: 7

  daily-metrics:
    runs-on: ubuntu-latest
    if: false  # Disable for now, enable when system is running
    steps:
      - name: Check System Status
        run: |
          echo "Checking system status..."

          # This would normally connect to the system API
          # For now, just log that it would run
          echo "Would check:"
          echo "- Backend Uptime"
          echo "- Cycles collected today"
          echo "- LightGBM training data size"
          echo "- WebSocket connection status"

      - name: Log Metrics
        run: |
          METRICS_FILE="metrics-$(date +%Y%m%d).json"

          cat > $METRICS_FILE << 'EOF'
          {
            "date": "DATE_PLACEHOLDER",
            "system": {
              "backend_uptime": 0,
              "websocket_connected": false
            },
            "training": {
              "cycles_collected": 0,
              "lightgbm_data_size_mb": 0,
              "trade_results": 0
            },
            "ml": {
              "model_trained": false,
              "model_accuracy": null
            }
          }
          EOF

          sed -i "s/DATE_PLACEHOLDER/$(date -u +%Y-%m-%d)/g" $METRICS_FILE

          echo "Metrics: $METRICS_FILE"
          cat $METRICS_FILE
